<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="static/stylecadastro.css">
</head>
<body> 
  
    <img id="fundohomesenai" src="static/fundohomesenai.jpg">

    <div class="container mt-3">
        <img id='logo_senai' src='static/logo_senai.png' alt="Logo SENAI">
    </div>

   <nav id="caixanavbar" class="navbar navbar-expand-lg bg-body-tertiary mt-3">
      <div class="container">
        <a class="navbar-brand" href="/home?">Voltar</a>
    
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Opções
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
              </ul>
            </li>
            <li class="nav-item">
              
            </li>
          </ul>

        </div>
      </div>
    </nav>


    <div id="caixatabela" class="container mt-4">

      <h2 id="titulotabela" class="mb-5 text-secondary">Novo Cadastro de Item</h2>
  
      <div class="bg-white rounded shadow-sm p-5">
          <form action="/salvaritem" method="POST" enctype="multipart/form-data">
              
              <div class="row">
                  <div class="col-md-8 mb-4">
                      <label class="form-label fw-bold text-muted">Nome do Produto</label>
                      <input type="text" name="nome" class="form-control" placeholder="Ex: Parafuso Sextavado" required>
                  </div>
                  <div class="col-md-4 mb-4">
                      <label class="form-label fw-bold text-muted">Quantidade</label>
                      <input type="number" name="quantidade" class="form-control" placeholder="0" required>
                  </div>
              </div>

              <div class="mb-4">
                  <label class="form-label fw-bold text-muted">Descrição Detalhada</label>
                  <textarea name="descricao" class="form-control" rows="3" placeholder="Descreva as especificações do item..."></textarea>
              </div>

              <div class="mb-4">
                  <label class="form-label fw-bold text-muted">Imagem do Item</label>
                  <input type="file" name="imagem" class="form-control">
              </div>

              <div class="d-flex justify-content-end mt-4">
                  <a href="/" class="btn btn-outline-secondary me-2">Cancelar</a>
                  <button type="submit" class="btn btn-primary" style="background-color: rgb(8, 69, 201); border: none; padding: 10px 30px;">Salvar no Almoxarifado</button>
              </div>

          </form>
      </div>
  
    </div>

</body>
</html>
